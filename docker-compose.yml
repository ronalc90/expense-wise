# ============================================
# ExpenseWise - Docker Compose Full Stack
# ============================================

services:
  # ── PostgreSQL ─────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: expensewise-db
    environment:
      POSTGRES_DB: expensewise
      POSTGRES_USER: ${DB_USER:-expensewise}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-expensewise}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - expensewise-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-expensewise} -d expensewise"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ── Redis ──────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: expensewise-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - expensewise-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Aplicacion ─────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: expensewise-app
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/expensewise
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-expensewise}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-expensewise}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-cambiar-en-produccion-clave-segura-256-bits}
      JAVA_OPTS: "-XX:MaxRAMPercentage=75.0"
    ports:
      - "8080:8080"
    networks:
      - expensewise-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  # ── Prometheus ─────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: expensewise-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - expensewise-net
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    restart: unless-stopped

  # ── Grafana ────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    container_name: expensewise-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    networks:
      - expensewise-net
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  expensewise-net:
    driver: bridge
    name: expensewise-network
