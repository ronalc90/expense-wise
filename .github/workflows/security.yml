name: Security Scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 6 * * 1'  # Lunes a las 6:00 AM UTC

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  # ──────────────────────────────────────────────
  # OWASP Dependency Check
  # ──────────────────────────────────────────────
  owasp-dependency-check:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Ejecutar Dependency Check
        run: |
          ./mvnw org.owasp:dependency-check-maven:check \
            -DfailBuildOnCVSS=9 \
            -Dformats=HTML,JSON,SARIF \
            -B || true

      - name: Publicar reporte OWASP
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-report
          path: |
            target/dependency-check-report.html
            target/dependency-check-report.json
          retention-days: 30

  # ──────────────────────────────────────────────
  # Trivy - Escaneo de contenedores
  # ──────────────────────────────────────────────
  trivy-scan:
    name: Trivy Container Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Construir JAR
        run: ./mvnw clean package -DskipTests -B

      - name: Construir imagen Docker
        run: docker build -t expensewise:scan .

      - name: Ejecutar Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'expensewise:scan'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Publicar resultados a GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'trivy'

      - name: Trivy - Escaneo del filesystem
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

  # ──────────────────────────────────────────────
  # CodeQL - Analisis de codigo
  # ──────────────────────────────────────────────
  codeql-analysis:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Inicializar CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java-kotlin

      - name: Compilar proyecto para CodeQL
        run: ./mvnw compile -B -q

      - name: Ejecutar analisis CodeQL
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:java-kotlin'

  # ──────────────────────────────────────────────
  # Escaneo de secretos
  # ──────────────────────────────────────────────
  secret-scanning:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ejecutar Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ──────────────────────────────────────────────
  # Reporte consolidado de seguridad
  # ──────────────────────────────────────────────
  security-report:
    name: Reporte de Seguridad
    runs-on: ubuntu-latest
    needs: [ owasp-dependency-check, trivy-scan, codeql-analysis, secret-scanning ]
    if: always()
    steps:
      - name: Resumen de seguridad
        run: |
          echo "============================================"
          echo "  Reporte de Seguridad - ExpenseWise"
          echo "============================================"
          echo ""
          echo "OWASP Dependency Check: ${{ needs.owasp-dependency-check.result }}"
          echo "Trivy Container Scan:   ${{ needs.trivy-scan.result }}"
          echo "CodeQL Analysis:        ${{ needs.codeql-analysis.result }}"
          echo "Secret Scanning:        ${{ needs.secret-scanning.result }}"
          echo ""
          echo "Revisar los reportes en la pestana Artifacts"
          echo "y en la pestana Security del repositorio."
