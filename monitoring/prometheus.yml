# ============================================
# Prometheus - Configuracion de scraping
# ============================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  # ── Spring Boot Actuator ───────────────────
  - job_name: 'expensewise'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 15s
    static_configs:
      - targets: ['app:8080']
        labels:
          application: 'expensewise'
          environment: 'production'

  # ── Prometheus (auto-monitoreo) ────────────
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
