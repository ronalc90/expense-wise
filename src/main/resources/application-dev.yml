spring:
  datasource:
    url: jdbc:h2:mem:expensewise;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    defer-datasource-initialization: true

  sql:
    init:
      mode: always

  flyway:
    enabled: false

server:
  port: 3001

logging:
  level:
    com.expensewise: DEBUG
    org.springframework.security: DEBUG
