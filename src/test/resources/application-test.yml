spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true

  flyway:
    enabled: false

app:
  jwt:
    secret: testSecretKeyThatIsAtLeast256BitsLongForHS256AlgorithmInTestEnvironment
    expiration-ms: 3600000

logging:
  level:
    com.expensewise: DEBUG
