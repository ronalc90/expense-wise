# ============================================
# PLANTILLA - No subir con valores reales
# Crear secreto con:
#   kubectl create secret generic expensewise-secrets \
#     --namespace=expensewise \
#     --from-literal=DB_USERNAME=expensewise \
#     --from-literal=DB_PASSWORD=<clave-segura> \
#     --from-literal=JWT_SECRET=<secreto-jwt-256-bits>
# ============================================
apiVersion: v1
kind: Secret
metadata:
  name: expensewise-secrets
  namespace: expensewise
  labels:
    app.kubernetes.io/name: expensewise
    app.kubernetes.io/component: secrets
type: Opaque
stringData:
  DB_USERNAME: "expensewise"
  DB_PASSWORD: "CAMBIAR_EN_PRODUCCION"
  JWT_SECRET: "CAMBIAR_POR_SECRETO_JWT_SEGURO_256_BITS"
